name: Quality Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.email "ci@test.local"
          git config user.name "CI Test"

      - name: Verify pre-commit hook does not drift HEAD (PAP-107)
        run: bash scripts/test-precommit-head.sh

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check for broken links in docs/
        run: npm run docs:check
